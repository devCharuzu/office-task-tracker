<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard | Optimized</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --messenger-blue: #0084ff; --messenger-bg: #f0f2f5; }
        body { background: #f3f4f6; font-family: 'Inter', sans-serif; padding-bottom: 80px; overflow-x: hidden; }
        
        /* Dashboard Components */
        .task-card { background: white; border: none; border-radius: 20px; padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; transition: transform 0.2s; }
        .status-pill { font-size: 0.7rem; padding: 5px 12px; border-radius: 20px; font-weight: 700; text-transform: uppercase; }
        .status-assigned { background: #fff7ed; color: #c2410c; }
        .status-received { background: #eff6ff; color: #1d4ed8; }
        .status-completed { background: #f0fdf4; color: #15803d; }

        /* Optimized Chat UI */
        .chat-modal-body { height: 500px; display: flex; flex-direction: column; background: #fff; }
        .chat-container { flex-grow: 1; overflow-y: auto; padding: 20px; background: var(--messenger-bg); display: flex; flex-direction: column; }
        .msg-wrapper { display: flex; flex-direction: column; margin-bottom: 12px; max-width: 80%; position: relative; }
        .msg-wrapper.own { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.theirs { align-self: flex-start; align-items: flex-start; }
        .msg-bubble { padding: 10px 16px; border-radius: 18px; font-size: 0.9rem; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .own .msg-bubble { background: var(--messenger-blue); color: white; border-bottom-right-radius: 4px; }
        .theirs .msg-bubble { background: white; color: black; border-bottom-left-radius: 4px; }
        
        .msg-menu { opacity: 0; position: absolute; top: 50%; transform: translateY(-50%); transition: 0.2s; cursor: pointer; }
        .own .msg-menu { left: -30px; }
        .msg-wrapper:hover .msg-menu { opacity: 1; }

        /* Mobile Nav */
        .mobile-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #e5e7eb; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        
        @media (min-width: 992px) { .container { max-width: 800px; } }
    </style>
</head>
<body>

    <main class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold m-0">Assignments</h4>
            <div class="bg-white px-3 py-1 rounded-pill shadow-sm small fw-bold" id="userName">---</div>
        </div>

        <div id="taskFeed" class="row g-3">
            <div class="text-center py-5"><div class="spinner-border text-primary"></div></div>
        </div>
    </main>

    <div class="mobile-nav">
        <a href="#" class="text-primary text-decoration-none text-center"><i class="bi bi-grid-fill fs-4"></i></a>
        <a href="#" onclick="logout()" class="text-danger text-decoration-none text-center"><i class="bi bi-box-arrow-left fs-4"></i></a>
    </div>

    <div class="modal fade" id="chatModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 overflow-hidden">
                <div class="modal-header border-0 shadow-sm px-4 py-3">
                    <h6 class="fw-bold m-0" id="chatTitle">Task Chat</h6>
                    <div class="dropdown">
                        <button class="btn btn-sm btn-light rounded-pill dropdown-toggle" data-bs-toggle="dropdown">Options</button>
                        <ul class="dropdown-menu border-0 shadow">
                            <li><a class="dropdown-item text-danger small" href="#" onclick="deleteChatPrivate()">Delete My Copy</a></li>
                        </ul>
                    </div>
                    <button type="button" class="btn-close ms-2" data-bs-dismiss="modal" onclick="activeTaskId=null"></button>
                </div>
                <div class="modal-body chat-modal-body p-0" id="chatBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwLGja8-IDIYIBEENNZNw2FhGQnKEt3vGaRjX1ndB34LFVfnkNkcebUg9HaI0k4Di4/exec";
        let session = JSON.parse(localStorage.getItem('office_session')), 
            globalData = {tasks:[], comments:[]}, 
            activeTaskId = null, 
            lastDataHash = "";

        if(!session) window.location.href = "index.html";

        async function sync(isAuto = false) {
            try {
                const res = await fetch(API_URL);
                const newData = await res.json();
                
                const newHash = JSON.stringify(newData.tasks.filter(t => String(t.EmployeeID) === String(session.ID))) + JSON.stringify(newData.comments);
                if (newHash === lastDataHash && isAuto) return;
                
                globalData = newData;
                lastDataHash = newHash;
                renderTasks();
                if(activeTaskId) renderComments();
            } catch (e) { console.error("Sync failed"); }
        }

        function renderTasks() {
            const myTasks = globalData.tasks.filter(t => String(t.EmployeeID) === String(session.ID) && String(t.Archived).toUpperCase() !== "TRUE");
            const feed = document.getElementById('taskFeed');
            
            if (myTasks.length === 0) {
                feed.innerHTML = '<div class="text-center py-5 text-muted">No active tasks.</div>';
                return;
            }

            feed.innerHTML = myTasks.reverse().map(t => `
                <div class="col-12">
                    <div class="task-card">
                        <div class="d-flex justify-content-between mb-3">
                            <span class="status-pill status-${t.Status.toLowerCase()}">${t.Status}</span>
                            <small class="text-muted">#${t.TaskID}</small>
                        </div>
                        <h5 class="fw-bold">${t.Title}</h5>
                        <p class="text-muted small">${t.Instructions}</p>
                        ${t.FileLink ? `<a href="${t.FileLink}" target="_blank" class="btn btn-sm btn-outline-primary rounded-pill mb-3 w-100">View Briefing</a>` : ''}
                        
                        <div class="d-flex gap-2">
                            ${t.Status === 'Assigned' ? `<button onclick="updateStatusOptimistic('${t.TaskID}', 'Received')" class="btn btn-primary w-100 rounded-pill fw-bold">Accept</button>` : ''}
                            ${t.Status === 'Received' ? `<button onclick="updateStatusOptimistic('${t.TaskID}', 'Completed')" class="btn btn-success w-100 rounded-pill fw-bold">Complete</button>` : ''}
                            ${t.Status === 'Completed' ? `<button class="btn btn-light w-100 rounded-pill fw-bold" disabled>Finished</button>` : ''}
                            <button onclick="openChat('${t.TaskID}', '${t.Title}')" class="btn btn-dark rounded-pill px-3"><i class="bi bi-chat-text-fill"></i></button>
                        </div>
                    </div>
                </div>`).join('');
        }

        // OPTIMISTIC UI: Status Change
        async function updateStatusOptimistic(taskId, status) {
            // Update local memory and re-render instantly
            const task = globalData.tasks.find(t => String(t.TaskID) === String(taskId));
            if(task) task.Status = status;
            renderTasks();

            await fetch(API_URL, {method:'POST', body: JSON.stringify({action:"SET_STATUS", taskId, status})});
            sync();
        }

        function openChat(taskId, title) {
            activeTaskId = taskId;
            document.getElementById('chatTitle').innerText = title;
            renderComments();
            new bootstrap.Modal(document.getElementById('chatModal')).show();
        }

        function renderComments() {
            const container = document.getElementById('chatBody');
            const comments = globalData.comments.filter(c => String(c.TaskID) === String(activeTaskId) && !String(c.HiddenBy || "").includes(session.ID));

            container.innerHTML = `
                <div class="chat-container" id="chatScroll">
                    ${comments.map(c => `
                        <div class="msg-wrapper ${c.SenderName === session.Name ? 'own' : 'theirs'}">
                            <div class="msg-bubble">${c.Message}
                                ${c.SenderName === session.Name ? `<div class="msg-menu dropdown"><i class="bi bi-three-dots" data-bs-toggle="dropdown"></i>
                                    <ul class="dropdown-menu border-0 shadow"><li><a class="dropdown-item small text-danger" onclick="unsendMsg('${c.Message}')">Unsend</a></li></ul>
                                </div>` : ''}
                            </div>
                        </div>`).join('') || '<div class="text-center my-auto text-muted">No history.</div>'}
                </div>
                <div class="p-3 bg-white border-top">
                    <div class="input-group">
                        <input type="text" id="chatInp" class="form-control border-0 bg-light rounded-pill px-3" placeholder="Aa" onkeypress="if(event.key==='Enter') sendMsg()">
                        <button class="btn btn-primary rounded-circle ms-2" onclick="sendMsg()"><i class="bi bi-send-fill"></i></button>
                    </div>
                </div>`;
            const s = document.getElementById('chatScroll'); if(s) s.scrollTop = s.scrollHeight;
        }

        // OPTIMISTIC UI: Chat Sending
        async function sendMsg() {
            const inp = document.getElementById('chatInp');
            const msg = inp.value.trim();
            if(!msg) return;

            const container = document.getElementById('chatScroll');
            const div = document.createElement('div');
            div.className = 'msg-wrapper own';
            div.innerHTML = `<div class="msg-bubble shadow-sm" style="opacity:0.6">${msg}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            inp.value = "";

            await fetch(API_URL, {method:'POST', body: JSON.stringify({action:"ADD_COMMENT", taskId: activeTaskId, sender: session.Name, message: msg})});
            sync();
        }

        async function unsendMsg(msg) {
            if(!confirm("Unsend?")) return;
            await fetch(API_URL, {method:'POST', body: JSON.stringify({action:"DELETE_COMMENT", taskId: activeTaskId, sender: session.Name, message: msg})});
            sync();
        }

        async function deleteChatPrivate() {
            if(!confirm("Delete your copy?")) return;
            await fetch(API_URL, {method:'POST', body: JSON.stringify({action:"HIDE_CHAT_PRIVATE", taskId: activeTaskId, userId: session.ID})});
            bootstrap.Modal.getInstance(document.getElementById('chatModal')).hide();
            activeTaskId = null;
            sync();
        }

        function logout() { localStorage.clear(); window.location.href="index.html"; }
        window.onload = () => { document.getElementById('userName').innerText = session.Name; sync(); };
        setInterval(() => sync(true), 15000);
    </script>
</body>
</html>

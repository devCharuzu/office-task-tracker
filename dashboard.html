<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        /* Responsive Sidebar */
        .sidebar { background: white; border-right: 1px solid #e2e8f0; min-height: 100vh; }
        @media (max-width: 768px) {
            .sidebar { min-height: auto; border-right: none; border-bottom: 1px solid #e2e8f0; padding: 1rem !important; }
            .profile-img { width: 60px; height: 60px; }
        }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; background: #e2e8f0; border: 3px solid #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .task-card { border: none; border-radius: 12px; border-left: 5px solid #cbd5e1; transition: 0.2s; background: white; }
        .status-Assigned { border-left-color: #f59e0b; }
        .status-Received { border-left-color: #3b82f6; }
        .status-Completed { border-left-color: #10b981; opacity: 0.8; }
        /* Chat Responsiveness */
        .chat-msg { padding: 8px 12px; border-radius: 15px; margin-bottom: 8px; font-size: 0.85rem; max-width: 90%; position: relative; word-wrap: break-word; }
        .msg-me { background: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg-them { background: #e2e8f0; color: #1e293b; align-self: flex-start; border-bottom-left-radius: 2px; }
        #commentThread { scroll-behavior: smooth; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 col-lg-2 sidebar p-4 shadow-sm">
            <div class="text-center mb-3">
                <img id="userPic" src="https://via.placeholder.com/80" class="profile-img mb-2">
                <h6 id="userNameDisplay" class="fw-bold mb-0 text-truncate">---</h6>
                <small id="userIdDisplay" class="text-muted"></small>
            </div>
            <nav class="nav flex-column flex-md-column flex-row justify-content-center gap-2 mt-2">
                <a class="nav-link text-dark fw-bold px-2 px-md-0" href="#"><i class="bi bi-list-task me-1"></i> Tasks</a>
                <a class="nav-link text-dark px-2 px-md-0" style="cursor:pointer" data-bs-toggle="modal" data-bs-target="#profileModal"><i class="bi bi-person-gear me-1"></i> Profile</a>
                <a class="nav-link text-danger px-2 px-md-0" style="cursor:pointer" onclick="logout()"><i class="bi bi-box-arrow-left me-1"></i> Logout</a>
            </nav>
        </div>

        <div class="col-md-9 col-lg-10 p-3 p-md-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0">Task Inbox</h4>
                <button onclick="loadTasks()" class="btn btn-sm btn-outline-primary rounded-pill"><i class="bi bi-arrow-clockwise"></i></button>
            </div>
            <div id="taskContainer" class="row g-3"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="commentModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-fullscreen-sm-down">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <h5 class="fw-bold">Task Discussion</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body d-flex flex-column">
                <div id="commentThread" class="d-flex flex-column mb-3" style="flex-grow: 1; height: 320px; overflow-y: auto; background: #f1f5f9; padding: 15px; border-radius: 10px;"></div>
                <div class="input-group">
                    <input type="text" id="commentInput" class="form-control" placeholder="Type concern..." onkeypress="if(event.key==='Enter') submitComment()">
                    <button class="btn btn-primary" onclick="submitComment()" id="sendCommentBtn"><i class="bi bi-send"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="profileModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header"><h5 class="modal-title fw-bold">Update Profile</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body p-4 text-center">
                <img id="editPreview" src="https://via.placeholder.com/80" class="profile-img mb-2" onclick="document.getElementById('editPicInput').click()" style="cursor:pointer">
                <input type="file" id="editPicInput" class="d-none" onchange="previewImage(this)">
                <input type="text" id="editName" class="form-control mb-3" placeholder="Full Name">
                <input type="password" id="editPass" class="form-control" placeholder="New Password">
            </div>
            <div class="modal-footer border-0"><button onclick="saveProfile()" id="saveBtn" class="btn btn-primary w-100">Save Changes</button></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwLGja8-IDIYIBEENNZNw2FhGQnKEt3vGaRjX1ndB34LFVfnkNkcebUg9HaI0k4Di4/exec";
    let session = JSON.parse(localStorage.getItem('office_session'));
    let activeTaskId = null;
    let isSending = false;
    let isModalOpen = false;
    let taskReadStatus = {}; 

    if (!session) window.location.href = "index.html";

    function updateSidebarUI() {
        document.getElementById('userNameDisplay').textContent = session.Name;
        document.getElementById('userIdDisplay').textContent = `ID: ${session.ID}`;
        if (session.ProfilePic) {
            const pic = session.ProfilePic + (session.ProfilePic.includes('?') ? '&' : '?') + 't=' + Date.now();
            document.getElementById('userPic').src = pic;
            document.getElementById('editPreview').src = pic;
        }
        document.getElementById('editName').value = session.Name;
    }

    async function loadTasks() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            const myTasks = data.tasks.filter(t => String(t.EmployeeID) === String(session.ID));
            renderTasksUI(myTasks, data.comments);
            if (isModalOpen && activeTaskId) {
                const thread = data.comments.filter(c => String(c.TaskID) === String(activeTaskId));
                updateChatThreadUI(thread);
                taskReadStatus[activeTaskId] = thread.length;
            }
        } catch(e) { console.error("Sync Error", e); }
    }

    function renderTasksUI(tasks, allComments) {
        document.getElementById('taskContainer').innerHTML = tasks.reverse().map(t => {
            const thread = allComments.filter(c => String(c.TaskID) === String(t.TaskID));
            const currentCount = thread.length;
            const hasNew = currentCount > (taskReadStatus[t.TaskID] || 0);

            return `
                <div class="col-12">
                    <div class="card task-card p-3 shadow-sm status-${t.Status}">
                        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center">
                            <div class="mb-2 mb-sm-0">
                                <span class="badge ${t.Status==='Assigned'?'bg-warning text-dark':(t.Status==='Received'?'bg-primary':'bg-success')} mb-1">${t.Status}</span>
                                <h6 class="fw-bold mb-0">${t.Title}</h6>
                                <p class="small text-muted mb-0">${t.Instructions || ''}</p>
                            </div>
                            <div class="d-flex gap-2 w-100 w-sm-auto justify-content-end">
                                <button onclick="openComments('${t.TaskID}', ${currentCount})" class="btn btn-sm btn-outline-secondary position-relative">
                                    <i class="bi bi-chat-dots"></i>
                                    ${hasNew ? '<span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"></span>' : ''}
                                </button>
                                ${t.Status === 'Assigned' ? `<button onclick="updateStatus('${t.TaskID}', 'Received')" class="btn btn-primary btn-sm rounded-pill px-3">Accept</button>` : ''}
                                ${t.Status === 'Received' ? `<button onclick="updateStatus('${t.TaskID}', 'Completed')" class="btn btn-success btn-sm rounded-pill px-3">Done</button>` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }).join('') || '<div class="text-center py-5 text-muted w-100">No tasks assigned yet.</div>';
    }

    async function openComments(taskId, count) {
        activeTaskId = taskId; taskReadStatus[taskId] = count; isModalOpen = true;
        new bootstrap.Modal(document.getElementById('commentModal')).show();
        loadTasks(); 
    }

    function updateChatThreadUI(thread) {
        const threadDiv = document.getElementById('commentThread');
        const newHtml = thread.map(c => `<div class="chat-msg ${c.SenderName === session.Name ? 'msg-me' : 'msg-them'}"><div style="font-size:0.65rem; opacity:0.8">${c.SenderName}</div>${c.Message}</div>`).join('') || '<div class="text-center mt-5 small text-muted">No messages yet.</div>';
        if (threadDiv.innerHTML !== newHtml) { threadDiv.innerHTML = newHtml; threadDiv.scrollTop = threadDiv.scrollHeight; }
    }

    async function submitComment() {
        const input = document.getElementById('commentInput');
        if (!input.value.trim() || isSending) return;
        isSending = true;
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "ADD_COMMENT", taskId: activeTaskId, senderName: session.Name, message: input.value.trim() }) });
        input.value = ''; isSending = false; loadTasks();
    }

    async function updateStatus(taskId, status) { await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "SET_STATUS", taskId, status }) }); loadTasks(); }

    async function saveProfile() {
        const btn = document.getElementById('saveBtn'); btn.disabled = true;
        const file = document.getElementById('editPicInput').files[0];
        let fileData = null, fileType = "";
        if (file) {
            fileData = await new Promise(r => { const reader = new FileReader(); reader.onload = () => r(reader.result.split(',')[1]); reader.readAsDataURL(file); });
            fileType = file.type;
        }
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "UPDATE_PROFILE", id: session.ID, name: document.getElementById('editName').value, pass: document.getElementById('editPass').value, fileData, fileType }) });
        const result = await res.json();
        if (result.status === "SUCCESS") { localStorage.setItem('office_session', JSON.stringify({...session, Name: document.getElementById('editName').value, ProfilePic: result.newPic || session.ProfilePic})); location.reload(); }
    }

    function previewImage(input) { if (input.files && input.files[0]) { const r = new FileReader(); r.onload = (e) => document.getElementById('editPreview').src = e.target.result; r.readAsDataURL(input.files[0]); } }
    function logout() { localStorage.clear(); window.location.href = "index.html"; }

    document.getElementById('commentModal').addEventListener('hidden.bs.modal', () => { isModalOpen = false; document.querySelectorAll('.modal-backdrop').forEach(b => b.remove()); document.body.style.overflow = 'auto'; loadTasks(); });

    setInterval(loadTasks, 5000);
    window.onload = () => { updateSidebarUI(); loadTasks(); };
</script>
</body>
</html>

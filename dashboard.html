<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .nav-custom { background: white; border-bottom: 1px solid #e2e8f0; }
        .badge-notify { position: absolute; top: 0; right: 0; padding: 3px 6px; border-radius: 50%; font-size: 10px; }
        .task-card { border: none; border-radius: 12px; transition: 0.2s; }
        .task-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }


        /* Add this inside your existing <style> tag */
    .profile-card { border-radius: 20px; transition: 0.3s; }
    .profile-img { 
        width: 120px; height: 120px; 
        object-fit: cover; border-radius: 50%; 
        border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
    }
    .nav-profile-img { width: 35px; height: 35px; object-fit: cover; border-radius: 50%; }
    .task-thumb { 
        width: 100%; height: 160px; 
        object-fit: cover; border-radius: 10px; 
        margin-bottom: 15px; background: #f0f0f0;
        border: 1px solid #eee;
    }
    </style>
</head>
<body>

<nav class="navbar nav-custom sticky-top mb-4">
    <div class="container d-flex justify-content-between">
        <a class="navbar-brand fw-bold text-primary" href="#">OFFICE PRO</a>
        <div class="d-flex align-items-center">
            <div class="position-relative me-3" style="cursor: pointer;" onclick="scrollToTasks()">
                <i class="bi bi-bell fs-4"></i>
                <span id="notifBadge" class="badge badge-notify bg-danger hidden">0</span>
            </div>
            <div class="dropdown">
                <button class="btn btn-light rounded-circle" type="button" data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle fs-5"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                    <li><h6 class="dropdown-header" id="dropName">User</h6></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="#" data-bs-toggle="modal" data-bs-target="#profileModal">Edit Profile</a></li>
                    <li><a class="dropdown-item text-danger" href="#" onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div id="mainContent">
        </div>
</div>

<div class="modal fade" id="profileModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header">
                <h5 class="fw-bold">Update Profile</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <label class="small fw-bold mt-2">Profile Picture</label>
<input type="file" id="picInput" class="form-control mb-3" accept="image/*">
                <label class="small fw-bold">Full Name</label>
                <input type="text" id="editName" class="form-control mb-3">
                <label class="small fw-bold">Designation</label>
                <input type="text" id="editDesignation" class="form-control mb-3" readonly>
                <label class="small fw-bold">New Password</label>
                <input type="password" id="editPass" class="form-control" placeholder="Leave blank to keep current">
            </div>
            <div class="modal-footer">
                <button onclick="updateProfile()" class="btn btn-primary w-100 fw-bold">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwLGja8-IDIYIBEENNZNw2FhGQnKEt3vGaRjX1ndB34LFVfnkNkcebUg9HaI0k4Di4/exec";
    const session = JSON.parse(localStorage.getItem('office_session'));

    if (!session) window.location.href = "index.html";

   async function init() {
    // 1. Set the name in the top menu
    document.getElementById('dropName').innerText = session.name;

    // 2. Fetch all data
    const res = await fetch(API_URL);
    const data = await res.json();
    
    // 3. Filter tasks specifically for this logged-in user
    const myTasks = data.tasks.filter(t => t.EmployeeID === session.id);

    // 4. Update the Bell Icon (Red Badge)
    const pendingCount = myTasks.filter(t => t.Status === 'Assigned').length;
    if (pendingCount > 0) {
        const badge = document.getElementById('notifBadge');
        badge.innerText = pendingCount;
        badge.classList.remove('hidden');
    }

    // 5. Decide what to show: Tasks or Profile
    renderDashboard(myTasks);
}

 function renderDashboard(tasks) {
    const container = document.getElementById('mainContent');
    const userPic = session.profilePic || 'https://via.placeholder.com/150';
    
    // Update the small navbar icon
    document.getElementById('navPic').src = userPic;

    if (tasks.length === 0) {
        // --- NO TASKS: Show Full Profile ---
        container.innerHTML = `
            <div class="text-center py-5">
                <div class="card profile-card border-0 shadow-sm p-5 mx-auto" style="max-width: 450px;">
                    <img src="${userPic}" class="profile-img mx-auto mb-3">
                    <h2 class="fw-bold m-0">${session.name}</h2>
                    <p class="text-muted mb-4">${session.designation}</p>
                    <div class="p-3 bg-light rounded-3 mb-4">
                        <small class="text-uppercase fw-bold text-muted d-block mb-1">Status</small>
                        <span class="text-success fw-bold"><i class="bi bi-check-circle-fill"></i> All Caught Up</span>
                    </div>
                    <button class="btn btn-primary w-100 fw-bold" data-bs-toggle="modal" data-bs-target="#profileModal">
                        Edit Profile Photo
                    </button>
                </div>
            </div>`;
    } else {
        // --- HAS TASKS: Show Task Cards with Thumbnails ---
        container.innerHTML = `<h4 class="fw-bold mb-4">Current Tasks</h4><div class="row">` + 
            tasks.map(t => {
                // Check if the attachment is an image for the thumbnail
                const isImage = t.FileLink.match(/\.(jpeg|jpg|gif|png|webp)$/i) != null;
                
                return `
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="card task-card p-3 border-0 shadow-sm h-100">
                        ${isImage ? `<img src="${t.FileLink}" class="task-thumb" onclick="window.open('${t.FileLink}')">` : ''}
                        <h6 class="fw-bold mb-1">${t.Title}</h6>
                        <p class="small text-secondary mb-3">${t.Instructions || 'No extra notes.'}</p>
                        
                        <div class="mt-auto">
                            ${t.FileLink !== "No File" && !isImage ? `<a href="${t.FileLink}" target="_blank" class="btn btn-light btn-sm w-100 mb-2">View File</a>` : ''}
                            <div class="d-grid gap-2">
                                ${t.Status === 'Assigned' ? `<button onclick="updateStatus('${t.TaskID}', 'RECEIVE')" class="btn btn-primary btn-sm fw-bold">Accept Task</button>` : ''}
                                ${t.Status === 'Received' ? `<button onclick="updateStatus('${t.TaskID}', 'COMPLETE')" class="btn btn-success btn-sm fw-bold">Mark as Done</button>` : ''}
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('') + `</div>`;
    }
}

    function updateNotif(tasks) {
        const pending = tasks.filter(t => t.Status === 'Assigned').length;
        if (pending > 0) {
            const badge = document.getElementById('notifBadge');
            badge.innerText = pending;
            badge.classList.remove('hidden');
        }
    }

    async function updateProfile() {
        const newName = document.getElementById('editName').value;
        const newPass = document.getElementById('editPass').value;
        
        const payload = { 
            action: "UPDATE_PROFILE", 
            id: session.id, 
            name: newName, 
            pass: newPass || session.password 
        };

        await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        
        // Update local session data
        session.name = newName;
        if(newPass) session.password = newPass;
        localStorage.setItem('office_session', JSON.stringify(session));
        
        alert("Profile Updated!");
        location.reload();
    }

    async function updateStatus(taskId, action) {
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ taskId, action }) });
        location.reload();
    }

    function logout() { localStorage.clear(); window.location.href = "index.html"; }
    init();
</script>
</body>
</html>

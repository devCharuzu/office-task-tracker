<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard | My Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .sidebar { background: white; border-right: 1px solid #e2e8f0; min-height: 100vh; }
        .task-card { border: none; border-radius: 12px; transition: transform 0.2s; border-left: 5px solid #cbd5e1; }
        .task-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .status-Assigned { border-left-color: #f59e0b; }
        .status-Received { border-left-color: #3b82f6; }
        .status-Completed { border-left-color: #10b981; opacity: 0.8; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; background: #e2e8f0; }
        .badge-status { font-size: 0.7rem; padding: 4px 8px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 col-lg-2 sidebar p-4 d-none d-md-block shadow-sm">
            <div class="text-center mb-4">
                <img id="userPic" src="https://via.placeholder.com/80" class="profile-img mb-3">
                <h6 id="userName" class="fw-bold mb-0">Loading...</h6>
                <small id="userId" class="text-muted"></small><br>
                <span id="userOffice" class="badge bg-primary mt-2"></span>
            </div>
            <hr>
            <nav class="nav flex-column">
                <a class="nav-link active fw-bold" href="#"><i class="bi bi-list-task me-2"></i>My Tasks</a>
                <a class="nav-link text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-left me-2"></i>Logout</a>
            </nav>
        </div>

        <div class="col-md-9 col-lg-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0">Task Inbox</h4>
                <button onclick="loadTasks()" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
            </div>

            <div id="noTasks" class="text-center py-5 d-none">
                <i class="bi bi-check2-circle display-1 text-muted"></i>
                <p class="mt-3 text-muted">No tasks found. You're all caught up!</p>
            </div>

            <div id="taskContainer" class="row g-3">
                </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwLGja8-IDIYIBEENNZNw2FhGQnKEt3vGaRjX1ndB34LFVfnkNkcebUg9HaI0k4Di4/exec";
    const session = JSON.parse(localStorage.getItem('office_session'));

    if (!session) window.location.href = "index.html";

    // Initialize UI with Session Data
    document.getElementById('userName').textContent = session.name || "User";
    document.getElementById('userId').textContent = session.id || "N/A";
    document.getElementById('userOffice').textContent = session.office || session.designation || "Staff";
    if(session.profilePic) document.getElementById('userPic').src = session.profilePic;

    async function loadTasks() {
        const container = document.getElementById('taskContainer');
        const noTasks = document.getElementById('noTasks');
        container.innerHTML = '<div class="text-center w-100 py-5"><div class="spinner-border text-primary"></div><p class="mt-2 text-muted">Fetching your assignments...</p></div>';
        
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            
            // Genius Fix: Strict string comparison for IDs like '001' vs 1
            const myTasks = data.tasks.filter(t => String(t.EmployeeID).trim() === String(session.id).trim());
            
            if (myTasks.length === 0) {
                noTasks.classList.remove('d-none');
                container.innerHTML = "";
                return;
            }

            noTasks.classList.add('d-none');
            container.innerHTML = [...myTasks].reverse().map(t => `
                <div class="col-12 mb-3">
                    <div class="card task-card p-3 shadow-sm status-${t.Status}">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="flex-grow-1">
                                <div class="d-flex align-items-center mb-2">
                                    <span class="badge bg-dark text-white me-2" style="font-size:0.65rem">${t.TaskID}</span>
                                    <span class="badge ${getStatusClass(t.Status)} badge-status">${t.Status}</span>
                                </div>
                                <h5 class="fw-bold mb-1">${t.Title}</h5>
                                <p class="text-muted small mb-2">${t.Instructions || 'No additional instructions provided.'}</p>
                                
                                ${t.ReferenceLink ? `
                                    <a href="${t.ReferenceLink}" target="_blank" class="btn btn-sm btn-outline-primary py-1 px-2 mt-1" style="font-size:0.75rem">
                                        <i class="bi bi-paperclip"></i> View Attached File
                                    </a>` : ''}
                            </div>
                            <div class="ms-3 text-end" id="actions-${t.TaskID}">
                                ${renderActions(t)}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch(e) {
            container.innerHTML = `<div class="alert alert-danger">Sync Error: ${e.message}</div>`;
        }
    }

    function getStatusClass(status) {
        switch(status) {
            case 'Assigned': return 'bg-warning text-dark';
            case 'Received': return 'bg-info text-white';
            case 'Completed': return 'bg-success text-white';
            default: return 'bg-secondary';
        }
    }

    function renderActions(task) {
        if (task.Status === 'Assigned') {
            return `<button onclick="updateStatus('${task.TaskID}', 'RECEIVE')" class="btn btn-primary shadow-sm btn-sm px-3 fw-bold">Accept Task</button>`;
        }
        if (task.Status === 'Received') {
            return `<button onclick="updateStatus('${task.TaskID}', 'COMPLETE')" class="btn btn-success shadow-sm btn-sm px-3 fw-bold">Mark Done</button>`;
        }
        return `<div class="text-success"><i class="bi bi-check-circle-fill h4"></i><br><small class="fw-bold">Finished</small></div>`;
    }

    async function updateStatus(taskId, actionType) {
        const btnContainer = document.getElementById(`actions-${taskId}`);
        const originalHTML = btnContainer.innerHTML;
        btnContainer.innerHTML = '<div class="spinner-grow spinner-grow-sm text-primary"></div>';

        try {
            // Using text/plain to avoid CORS preflight issues in GAS
            const response = await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ 
                    action: actionType, 
                    taskId: taskId,
                    employeeId: session.id 
                })
            });

            // Since no-cors doesn't give us the response, we assume success after a delay
            setTimeout(() => {
                loadTasks();
            }, 1500);

        } catch(e) {
            alert("Connection error. Try again.");
            btnContainer.innerHTML = originalHTML;
        }
    }

    function logout() { localStorage.clear(); window.location.href = "index.html"; }
    loadTasks();
</script>
</body>
</html>

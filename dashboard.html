<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard | My Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .sidebar { background: white; border-right: 1px solid #e2e8f0; min-height: 100vh; }
        .task-card { border: none; border-radius: 12px; transition: transform 0.2s; border-left: 5px solid #cbd5e1; }
        .task-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .status-Assigned { border-left-color: #f59e0b; }
        .status-Received { border-left-color: #3b82f6; }
        .status-Completed { border-left-color: #10b981; opacity: 0.8; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; background: #e2e8f0; }
        .badge-status { font-size: 0.7rem; padding: 4px 8px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 col-lg-2 sidebar p-4 d-none d-md-block shadow-sm">
            <div class="text-center mb-4">
                <img id="userPic" src="https://via.placeholder.com/80" class="profile-img mb-3">
                <h6 id="userName" class="fw-bold mb-0">Loading...</h6>
                <small id="userId" class="text-muted"></small><br>
                <span id="userOffice" class="badge bg-primary mt-2"></span>
            </div>
            <hr>
            <nav class="nav flex-column">
                <a class="nav-link active fw-bold" href="#"><i class="bi bi-list-task me-2"></i>My Tasks</a>
                <a class="nav-link text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-left me-2"></i>Logout</a>
            </nav>
        </div>

        <div class="col-md-9 col-lg-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0">Task Inbox</h4>
                <button onclick="loadTasks()" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
            </div>

            <div id="noTasks" class="text-center py-5 d-none">
                <i class="bi bi-check2-circle display-1 text-muted"></i>
                <p class="mt-3 text-muted">No tasks found. You're all caught up!</p>
            </div>

            <div id="taskContainer" class="row g-3">
                </div>
        </div>
    </div>
</div>

<script>
    // MUST MATCH YOUR Code.gs DEPLOYMENT URL
    const API_URL = "https://script.google.com/macros/s/AKfycbwLGja8-IDIYIBEENNZNw2FhGQnKEt3vGaRjX1ndB34LFVfnkNkcebUg9HaI0k4Di4/exec";

    const session = JSON.parse(localStorage.getItem('office_session'));
    if (!session) window.location.href = "index.html";

    // Initialize UI
    document.getElementById('userName').textContent = session.name;
    document.getElementById('userId').textContent = session.id;
    document.getElementById('userOffice').textContent = session.designation;
    if(session.profilePic) document.getElementById('userPic').src = session.profilePic;

    async function loadTasks() {
        const container = document.getElementById('taskContainer');
        container.innerHTML = '<div class="text-center w-100"><div class="spinner-border text-primary"></div></div>';
        
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            
            // Filter: Only tasks where EmployeeID matches current user's ID
            const myTasks = data.tasks.filter(t => String(t.EmployeeID) === String(session.id));
            
            if (myTasks.length === 0) {
                document.getElementById('noTasks').classList.remove('d-none');
                container.innerHTML = "";
                return;
            }

            document.getElementById('noTasks').classList.add('d-none');
            container.innerHTML = myTasks.reverse().map(t => `
                <div class="col-12">
                    <div class="card task-card p-3 shadow-sm status-${t.Status}">
                        <div class="d-flex justify-content-between">
                            <div>
                                <span class="badge bg-secondary badge-status mb-2">${t.TaskID}</span>
                                <h5 class="fw-bold mb-1">${t.Title}</h5>
                                <p class="text-muted small mb-2">${t.Instructions || 'No extra instructions.'}</p>
                                ${t.FileLink ? `<a href="${t.FileLink}" target="_blank" class="btn btn-sm btn-link p-0 text-decoration-none"><i class="bi bi-paperclip"></i> View Attachment</a>` : ''}
                            </div>
                            <div class="text-end">
                                <span class="badge ${getStatusClass(t.Status)} mb-3">${t.Status}</span>
                                <div id="actions-${t.TaskID}">
                                    ${renderActions(t)}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch(e) {
            container.innerHTML = `<div class="alert alert-danger">Error loading tasks: ${e.message}</div>`;
        }
    }

    function getStatusClass(status) {
        if(status === 'Assigned') return 'bg-warning text-dark';
        if(status === 'Received') return 'bg-primary';
        return 'bg-success';
    }

    function renderActions(task) {
        if (task.Status === 'Assigned') {
            return `<button onclick="updateStatus('${task.TaskID}', 'RECEIVE')" class="btn btn-sm btn-primary px-4">Receive Task</button>`;
        }
        if (task.Status === 'Received') {
            return `<button onclick="updateStatus('${task.TaskID}', 'COMPLETE')" class="btn btn-sm btn-success px-4">Mark Complete</button>`;
        }
        return `<i class="bi bi-patch-check-fill text-success h4"></i>`;
    }

    async function updateStatus(taskId, action) {
        const btnContainer = document.getElementById(`actions-${taskId}`);
        btnContainer.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action, taskId })
            });
            const result = await response.text();
            if (result === "SUCCESS") {
                loadTasks(); // Refresh list
            }
        } catch(e) {
            alert("Update failed. Check connection.");
            loadTasks();
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }

    loadTasks();
</script>
</body>
</html>

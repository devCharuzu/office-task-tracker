<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 id="welcome">My Tasks</h3>
        <button onclick="logout()" class="btn btn-sm btn-danger">Logout</button>
    </div>
    <div id="taskList" class="row"></div>
</div>

<script>
    const API_URL = "YOUR_APPS_SCRIPT_URL";

    // SECURITY GUARD: Check if Employee is logged in
    const session = JSON.parse(localStorage.getItem('office_session'));
    if (!session) {
        window.location.href = "index.html";
    }
    document.getElementById('welcome').innerText = `Tasks for ${session.name}`;

    async function loadMyTasks() {
        const res = await fetch(API_URL);
        const data = await res.json();
        const myTasks = data.tasks.filter(t => t.EmployeeID === session.id);
        
        document.getElementById('taskList').innerHTML = myTasks.map(t => `
            <div class="col-md-6 mb-3">
                <div class="card p-3 shadow-sm border-start border-4 border-primary">
                    <h5>${t.Title}</h5>
                    <p class="small">${t.Instructions}</p>
                    <div class="d-flex gap-2">
                        ${t.Status === 'Assigned' ? `<button onclick="update('${t.TaskID}', 'RECEIVE')" class="btn btn-sm btn-primary">Receive</button>` : ''}
                        ${t.Status === 'Received' ? `<button onclick="update('${t.TaskID}', 'COMPLETE')" class="btn btn-sm btn-success">Complete</button>` : ''}
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function update(taskId, action) {
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ taskId, action }) });
        location.reload();
    }

    function logout() { localStorage.clear(); window.location.href = "index.html"; }
    loadMyTasks();
</script>
</body>
</html>

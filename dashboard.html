<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Work Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .task-card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand small" id="userName">Employee Portal</span>
        <button onclick="logout()" class="btn btn-outline-danger btn-sm">Exit</button>
    </div>
</nav>

<div class="container">
    <h4 class="fw-bold mb-4">My Assigned Tasks</h4>
    <div id="taskList" class="row">
        </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwLGja8-IDIYIBEENNZNw2FhGQnKEt3vGaRjX1ndB34LFVfnkNkcebUg9HaI0k4Di4/exec";

    // Security Guard
    const session = JSON.parse(localStorage.getItem('office_session'));
    if (!session) window.location.href = "index.html";
    document.getElementById('userName').innerText = session.name;

    async function loadTasks() {
        const res = await fetch(API_URL);
        const data = await res.json();
        const myTasks = data.tasks.filter(t => t.EmployeeID === session.id);
        
        const container = document.getElementById('taskList');
        if(myTasks.length === 0) {
            container.innerHTML = `<p class="text-center text-muted mt-5">No tasks found for your ID.</p>`;
            return;
        }

        container.innerHTML = myTasks.map(t => `
            <div class="col-md-6 col-lg-4 mb-4">
                <div class="card task-card p-3 border-top border-4 border-${t.Status === 'Completed' ? 'success' : 'primary'}">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h6 class="fw-bold m-0">${t.Title}</h6>
                        <span class="small text-muted">${t.Status}</span>
                    </div>
                    <p class="small text-secondary mb-3">${t.Instructions || 'No extra instructions.'}</p>
                    ${t.FileLink !== "No File" ? `<a href="${t.FileLink}" target="_blank" class="btn btn-sm btn-light w-100 mb-2">📎 Open Attachment</a>` : ''}
                    
                    <div class="d-grid gap-2">
                        ${t.Status === 'Assigned' ? `<button onclick="update('${t.TaskID}', 'RECEIVE')" class="btn btn-primary btn-sm">Confirm Receipt</button>` : ''}
                        ${t.Status === 'Received' ? `<button onclick="update('${t.TaskID}', 'COMPLETE')" class="btn btn-success btn-sm">Mark Done</button>` : ''}
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function update(taskId, action) {
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ taskId, action }) });
        location.reload();
    }

    function logout() { localStorage.clear(); window.location.href = "index.html"; }
    loadTasks();
</script>
</body>
</html>

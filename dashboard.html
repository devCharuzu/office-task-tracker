<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard | Task Inbox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .sidebar { background: white; border-right: 1px solid #e2e8f0; min-height: 100vh; position: sticky; top: 0; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; background: #e2e8f0; border: 3px solid #fff; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .task-card { border: none; border-radius: 12px; border-left: 5px solid #cbd5e1; transition: 0.2s; }
        .status-Assigned { border-left-color: #f59e0b; }
        .status-Received { border-left-color: #3b82f6; }
        .status-Completed { border-left-color: #10b981; opacity: 0.8; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 col-lg-2 sidebar p-4 shadow-sm">
            <div class="text-center mb-4">
                <img id="userPic" src="https://via.placeholder.com/80" class="profile-img mb-3">
                <h6 id="userNameDisplay" class="fw-bold mb-0">---</h6>
                <small id="userIdDisplay" class="text-muted"></small><br>
                <span id="userOfficeDisplay" class="badge bg-primary mt-2">---</span>
            </div>
            <hr>
            <nav class="nav flex-column gap-2">
                <a class="nav-link active fw-bold px-0" href="#"><i class="bi bi-list-task me-2"></i>My Tasks</a>
                <a class="nav-link text-dark px-0" href="#" data-bs-toggle="modal" data-bs-target="#profileModal">
                    <i class="bi bi-person-gear me-2"></i>Edit Profile
                </a>
                <a class="nav-link text-danger mt-4 px-0" href="#" onclick="logout()"><i class="bi bi-box-arrow-left me-2"></i>Logout</a>
            </nav>
        </div>

        <div class="col-md-9 col-lg-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0">Task Inbox</h4>
                <button onclick="loadTasks()" class="btn btn-sm btn-outline-primary rounded-pill"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
            </div>
            <div id="taskContainer" class="row g-3">
                <div class="text-center py-5"><div class="spinner-border text-primary"></div></div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="profileModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">Update Profile</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="text-center mb-4">
                    <img id="editPreview" src="https://via.placeholder.com/80" class="profile-img mb-2" style="cursor: pointer;" onclick="document.getElementById('editPicInput').click()">
                    <p class="small text-muted">Click image to upload</p>
                    <input type="file" id="editPicInput" class="hidden" accept="image/*" onchange="previewImage(this)">
                </div>
                <div class="mb-3">
                    <label class="small fw-bold">Full Name</label>
                    <input type="text" id="editName" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="small fw-bold">New Password</label>
                    <input type="password" id="editPass" class="form-control" placeholder="Leave blank to keep current">
                </div>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                <button type="button" onclick="saveProfile()" id="saveBtn" class="btn btn-primary px-4">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwLGja8-IDIYIBEENNZNw2FhGQnKEt3vGaRjX1ndB34LFVfnkNkcebUg9HaI0k4Di4/exec"; // PASTE YOUR URL HERE
    let session = JSON.parse(localStorage.getItem('office_session'));

    if (!session) window.location.href = "index.html";

    // 1. INITIALIZE UI (Fixing the "Name not showing" bug)
    function updateSidebarUI() {
        // Ensure keys match the GSheet exactly (ID, Name, Office, ProfilePic)
        document.getElementById('userNameDisplay').textContent = session.Name || "Unknown User";
        document.getElementById('userIdDisplay').textContent = `ID: ${session.ID}`;
        document.getElementById('userOfficeDisplay').textContent = session.Office || "Staff";
        
        if (session.ProfilePic) {
            document.getElementById('userPic').src = session.ProfilePic;
            document.getElementById('editPreview').src = session.ProfilePic;
        }
        document.getElementById('editName').value = session.Name;
    }

    // 2. FETCH TASKS
    async function loadTasks() {
        const container = document.getElementById('taskContainer');
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            // Filter by EmployeeID (Matches GSheet column name)
            const myTasks = data.tasks.filter(t => String(t.EmployeeID) === String(session.ID));
            
            if (myTasks.length === 0) {
                container.innerHTML = '<div class="text-center text-muted py-5">No tasks found.</div>';
                return;
            }

            container.innerHTML = myTasks.reverse().map(t => `
                <div class="col-12">
                    <div class="card task-card p-3 shadow-sm status-${t.Status}">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <span class="badge ${t.Status === 'Assigned' ? 'bg-warning text-dark' : 'bg-success'} mb-2">${t.Status}</span>
                                <h6 class="fw-bold mb-1">${t.Title}</h6>
                                <p class="small text-muted mb-2">${t.Instructions || 'No instructions provided.'}</p>
                                ${t.FileLink ? `<a href="${t.FileLink}" target="_blank" class="btn btn-sm btn-link p-0 text-decoration-none"><i class="bi bi-paperclip"></i> View Attachment</a>` : ''}
                            </div>
                            <div id="btn-group-${t.TaskID}">
                                ${t.Status === 'Assigned' ? `<button onclick="updateStatus('${t.TaskID}', 'Received')" class="btn btn-primary btn-sm rounded-pill px-3">Accept</button>` : ''}
                                ${t.Status === 'Received' ? `<button onclick="updateStatus('${t.TaskID}', 'Completed')" class="btn btn-success btn-sm rounded-pill px-3">Mark Done</button>` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (e) { container.innerHTML = "Error loading tasks."; }
    }

    // 3. UPDATE STATUS (Accepted/Done)
    async function updateStatus(taskId, status) {
        document.getElementById(`btn-group-${taskId}`).innerHTML = '<div class="spinner-border spinner-border-sm"></div>';
        await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "SET_STATUS", taskId, status })
        });
        loadTasks();
    }

    /async function saveProfile() {
    const btn = document.getElementById('saveBtn');
    const fileInput = document.getElementById('editPicInput');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Syncing...';

    let fileData = null, fileType = "";
    if (fileInput.files[0]) {
        fileData = await new Promise(r => {
            const reader = new FileReader();
            reader.onload = () => r(reader.result.split(',')[1]);
            reader.readAsDataURL(fileInput.files[0]);
        });
        fileType = fileInput.files[0].type;
    }

    const payload = {
        action: "UPDATE_PROFILE",
        id: session.ID,
        name: document.getElementById('editName').value,
        pass: document.getElementById('editPass').value || session.Password,
        fileData, fileType
    };

    try {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        
        if (result.status === "SUCCESS") {
            // 1. Update the local session object with new data
            session.Name = payload.name;
            if (payload.pass) session.Password = payload.pass;
            
            // 2. Update the Profile Picture URL from the server's response
            if (result.newPic) {
                session.ProfilePic = result.newPic;
            }

            // 3. Save back to localStorage
            localStorage.setItem('office_session', JSON.stringify(session));
            
            // 4. Hot-swap the UI elements (No reload needed!)
            updateSidebarUI();
            
            // 5. Close modal and notify
            const modalEl = document.getElementById('profileModal');
            const modalInstance = bootstrap.Modal.getInstance(modalEl);
            modalInstance.hide();
            
            alert("✅ Profile & Picture updated successfully!");
        }
    } catch (e) { 
        console.error(e);
        alert("Update failed. Check your internet or Apps Script deployment."); 
    } finally { 
        btn.disabled = false; 
        btn.innerText = "Save Changes"; 
    }
}

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => document.getElementById('editPreview').src = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }
    }

    function logout() { localStorage.clear(); window.location.href = "index.html"; }

    window.onload = () => {
        updateSidebarUI();
        loadTasks();
    };
</script>
</body>
</html>

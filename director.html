<script>
    const API_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE"; 

    // --- 1. SECURITY & SESSION CHECK ---
    const session = JSON.parse(localStorage.getItem('office_session'));
    if (!session || session.role !== "Director") {
        window.location.href = "index.html"; 
    }

    let allUsers = [];

    // --- 2. LOAD DATA FROM GOOGLE SHEETS ---
    async function loadData() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            allUsers = data.users;
            renderTasks(data.tasks);
        } catch (err) {
            console.error("Failed to load data:", err);
        }
    }

    // --- 3. FILTER EMPLOYEES BY OFFICE ---
    function filterEmployees() {
        const office = document.getElementById('designation').value;
        const select = document.getElementById('empSelect');
        select.innerHTML = '<option value="">-- Select Employee --</option>';
        
        const filtered = allUsers.filter(u => u.designation === office && u.role !== "Director");
        
        if (filtered.length > 0) {
            filtered.forEach(u => {
                let opt = document.createElement('option');
                opt.value = u.id;
                opt.textContent = u.name;
                select.appendChild(opt);
            });
            select.disabled = false;
        } else {
            select.disabled = true;
        }
    }

    // --- 4. RENDER THE MONITOR TABLE ---
    function renderTasks(tasks) {
        const tbody = document.getElementById('taskTableBody');
        tbody.innerHTML = tasks.map(t => `
            <tr>
                <td>
                    <div class="fw-bold">${t.Title}</div>
                    <div class="text-muted small">${t.Instructions.substring(0, 30)}...</div>
                </td>
                <td>${t.EmployeeName}</td>
                <td><span class="badge ${t.Status === 'Completed' ? 'bg-success' : 'bg-warning text-dark'}">${t.Status}</span></td>
                <td>${t.FileLink !== "No File" ? `<a href="${t.FileLink}" target="_blank">📎</a>` : '-'}</td>
            </tr>
        `).join('');
    }

    // --- 5. TASK CREATION LOGIC (THE FETCH PART) ---
    document.getElementById('taskForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "Uploading Task...";

        const file = document.getElementById('fileInput').files[0];
        let fileData = null, fileName = "", fileType = "";

        // Convert file to Base64 if one is selected
        if (file) {
            fileData = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            });
            fileName = file.name;
            fileType = file.type;
        }

        const payload = {
            action: "CREATE",
            taskId: "T" + Date.now(),
            title: document.getElementById('title').value,
            empId: document.getElementById('empSelect').value,
            empName: document.getElementById('empSelect').options[document.getElementById('empSelect').selectedIndex].text,
            designation: document.getElementById('designation').value,
            instructions: document.getElementById('instructions').value,
            fileData: fileData,
            fileName: fileName,
            fileType: fileType
        };

        try {
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert("Task Assigned Successfully!");
            location.reload(); 
        } catch (err) {
            alert("Error: " + err);
            btn.disabled = false;
            btn.innerText = "Create Task";
        }
    };

    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }

    // Initialize
    loadData();
</script>

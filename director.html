<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-grad: linear-gradient(135deg, #1e293b, #334155); }
        body { background: #f3f4f6; font-family: 'Inter', sans-serif; margin: 0; }
        .sidebar { background: white; border-right: 1px solid #e5e7eb; height: 100vh; position: fixed; width: 260px; z-index: 1000; }
        .mobile-nav { display: none; position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #e5e7eb; z-index: 1001; padding: 10px 0; }
        .main-content { margin-left: 260px; padding: 40px; min-height: 100vh; }
        .card-custom { border: none; border-radius: 20px; background: white; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        @media (max-width: 992px) {
            .sidebar { display: none; }
            .mobile-nav { display: flex; justify-content: space-around; }
            .main-content { margin-left: 0; padding: 20px 20px 100px 20px; }
        }
    </style>
</head>
<body>
    <main class="main-content">
        <div class="row g-4">
            <div class="col-12 col-xl-4">
                <div class="card card-custom p-4 shadow-sm">
                    <h6 class="fw-bold mb-4">New Assignment</h6>
                    <select id="empSelect" class="form-select mb-3 border-0 bg-light"></select>
                    <input type="text" id="taskTitle" class="form-control mb-3 border-0 bg-light" placeholder="Task Title">
                    <textarea id="taskInstructions" class="form-control mb-3 border-0 bg-light" rows="3" placeholder="Instructions..."></textarea>
                    <button onclick="createTask()" id="createBtn" class="btn btn-dark w-100 rounded-pill fw-bold">Dispatch Task</button>
                </div>
            </div>
            <div class="col-12 col-xl-8">
                <div class="card card-custom p-4">
                    <h6 class="fw-bold mb-4">Live Activity</h6>
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <tbody id="taskTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwLGja8-IDIYIBEENNZNw2FhGQnKEt3vGaRjX1ndB34LFVfnkNkcebUg9HaI0k4Di4/exec";
        let globalData = { users: [], tasks: [] }, session = JSON.parse(localStorage.getItem('office_session'));

        async function refreshData() {
            try {
                const res = await fetch(API_URL); 
                globalData = await res.json();
                renderEmployees(); 
                renderTasksUI(globalData.tasks.filter(t => String(t.Archived).toUpperCase() !== "TRUE"), 'taskTableBody');
            } catch (e) { console.error(e); }
        }

        function renderEmployees() {
            document.getElementById('empSelect').innerHTML = globalData.users
                .filter(u => u.Role !== 'Director')
                .map(u => `<option value="${u.ID}">${u.Name}</option>`).join('');
        }

        async function createTask() {
            const btn = document.getElementById('createBtn');
            const empId = document.getElementById('empSelect').value;
            const emp = globalData.users.find(u => String(u.ID) === String(empId));
            
            btn.disabled = true;
            btn.innerHTML = 'Dispatching...';
            
            await fetch(API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ 
                    action: "CREATE_TASK", 
                    empId, 
                    empName: emp.Name, 
                    title: document.getElementById('taskTitle').value, 
                    instructions: document.getElementById('taskInstructions').value 
                })
            });
            
            btn.disabled = false;
            btn.innerHTML = 'Dispatch Task';
            alert("Task Sent!");
            refreshData();
        }

        function renderTasksUI(tasks, tbodyId) {
            document.getElementById(tbodyId).innerHTML = tasks.reverse().map(t => `
                <tr class="border-bottom">
                    <td><div class="fw-bold small">${t.EmployeeName}</div></td>
                    <td><div class="small text-truncate" style="max-width:150px;">${t.Title}</div></td>
                    <td><span class="badge ${t.Status==='Completed'?'bg-success':'bg-warning text-dark'}">${t.Status}</span></td>
                </tr>`).join('') || '<tr><td colspan="3" class="text-center py-4">No active tasks</td></tr>';
        }

        window.onload = refreshData;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director Control Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand">Director Dashboard</span>
        <button onclick="logout()" class="btn btn-outline-light btn-sm">Logout</button>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card p-4 shadow-sm">
                <h5 class="fw-bold">Assign New Task</h5>
                <form id="taskForm">
                    <input type="text" id="title" class="form-control mb-2" placeholder="Task Title" required>
                    <select id="designation" class="form-select mb-2" onchange="filterEmployees()" required>
                        <option value="">-- Office --</option>
                        <option value="Admin">Admin</option>
                        <option value="Finance">Finance</option>
                        <option value="HR">HR</option>
                    </select>
                    <select id="empSelect" class="form-select mb-2" disabled required></select>
                    <textarea id="instructions" class="form-control mb-2" placeholder="Instructions"></textarea>
                    <input type="file" id="fileInput" class="form-control mb-3">
                    <button type="submit" id="submitBtn" class="btn btn-primary w-100">Create Task</button>
                </form>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card p-4 shadow-sm">
                <h5 class="fw-bold">Live Monitor</h5>
                <div class="table-responsive">
                    <table class="table small">
                        <thead><tr><th>Task</th><th>Employee</th><th>Status</th></tr></thead>
                        <tbody id="taskTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "YOUR_APPS_SCRIPT_URL";

    // SECURITY GUARD: Check if Director is logged in
    const session = JSON.parse(localStorage.getItem('office_session'));
    if (!session || session.role !== "Director") {
        window.location.href = "index.html"; 
    }

    let allUsers = [];

    async function loadData() {
        const res = await fetch(API_URL);
        const data = await res.json();
        allUsers = data.users;
        renderTasks(data.tasks);
    }

    function filterEmployees() {
        const office = document.getElementById('designation').value;
        const select = document.getElementById('empSelect');
        select.innerHTML = '';
        const filtered = allUsers.filter(u => u.designation === office && u.role !== "Director");
        filtered.forEach(u => {
            let opt = document.createElement('option');
            opt.value = u.id; opt.textContent = u.name;
            select.appendChild(opt);
        });
        select.disabled = filtered.length === 0;
    }

    function renderTasks(tasks) {
        document.getElementById('taskTableBody').innerHTML = tasks.map(t => `
            <tr>
                <td><strong>${t.Title}</strong></td>
                <td>${t.EmployeeName}</td>
                <td><span class="badge bg-secondary">${t.Status}</span></td>
            </tr>
        `).join('');
    }

    function logout() { localStorage.clear(); window.location.href = "index.html"; }
    
    // Add the Task Creation fetch logic here (the one used in previous prompts)
    loadData();
</script>
</body>
</html>

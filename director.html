<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director Control Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .nav-glass { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); color: white; }
        .card-custom { border: none; border-radius: 20px; background: white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .status-pill { font-size: 0.75rem; padding: 6px 12px; border-radius: 10px; font-weight: 600; }
        .bg-assigned { background: #fff7ed; color: #c2410c; }
        .bg-received { background: #eff6ff; color: #1d4ed8; }
        .bg-completed { background: #f0fdf4; color: #15803d; }
        .emp-row:hover { background: #f8fafc; cursor: pointer; }
        .chat-msg { padding: 10px 14px; border-radius: 18px; font-size: 0.85rem; max-width: 85%; }
        .msg-me { background: #1e293b; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-them { background: #e2e8f0; color: #1e293b; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        /* Hamburger Sidebar for Tablet/Mobile */
        @media (max-width: 991px) {
            .assign-card { margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark nav-glass sticky-top py-3 shadow-sm">
        <div class="container-fluid">
            <div class="d-flex align-items-center">
                <button class="btn btn-outline-light border-0 me-2 d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
                    <i class="bi bi-list fs-4"></i>
                </button>
                <span class="navbar-brand fw-bold"><i class="bi bi-shield-check me-2"></i>Director Center</span>
            </div>
            <button class="btn btn-light btn-sm rounded-pill px-3" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card card-custom p-4 assign-card h-100">
                    <h5 class="fw-bold mb-4"><i class="bi bi-plus-circle-dotted me-2 text-primary"></i>Assign Task</h5>
                    <div class="mb-3">
                        <label class="small fw-bold text-muted">Employee</label>
                        <select id="empSelect" class="form-select border-0 bg-light rounded-3"></select>
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold text-muted">Title</label>
                        <input type="text" id="taskTitle" class="form-control border-0 bg-light rounded-3">
                    </div>
                    <div class="mb-4">
                        <label class="small fw-bold text-muted">Instructions</label>
                        <textarea id="taskInstructions" class="form-control border-0 bg-light rounded-3" rows="3"></textarea>
                    </div>
                    <button onclick="createTask()" id="createBtn" class="btn btn-primary w-100 rounded-3 py-2 fw-bold shadow-sm">Send Assignment</button>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card card-custom p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold m-0">Live Monitor</h5>
                        <button onclick="refreshData()" class="btn btn-light btn-sm rounded-circle"><i class="bi bi-arrow-repeat"></i></button>
                    </div>
                    <div class="table-responsive">
                        <table class="table align-middle border-0">
                            <thead><tr class="text-muted small"><th>Employee</th><th>Task</th><th>Status</th><th class="text-center">Chat</th></tr></thead>
                            <tbody id="taskTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="commentModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-fullscreen-sm-down">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-bold">Discussion</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body d-flex flex-column">
                    <div id="commentThread" class="p-3 d-flex flex-column gap-2" style="height: 400px; overflow-y: auto; background: #f8fafc; border-radius: 15px;"></div>
                    <div class="mt-3">
                        <div class="input-group">
                            <input type="text" id="commentInput" class="form-control border-0 bg-light" placeholder="Reply..." onkeypress="if(event.key==='Enter') submitComment()">
                            <button class="btn btn-primary rounded-3" onclick="submitComment()" id="sendCommentBtn"><i class="bi bi-send-fill"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwLGja8-IDIYIBEENNZNw2FhGQnKEt3vGaRjX1ndB34LFVfnkNkcebUg9HaI0k4Di4/exec";
        let globalData = { users: [], tasks: [], comments: [] };
        let activeTaskId = null, isSending = false, isModalOpen = false, taskReadStatus = {};

        async function refreshData() {
            try {
                const res = await fetch(API_URL);
                globalData = await res.json();
                renderEmployees();
                renderTasks();
                if (isModalOpen && activeTaskId) {
                    const thread = globalData.comments.filter(c => String(c.TaskID) === String(activeTaskId));
                    renderThread(thread);
                    taskReadStatus[activeTaskId] = thread.length;
                }
            } catch (e) { console.error(e); }
        }

        function renderEmployees() {
            const select = document.getElementById('empSelect');
            select.innerHTML = globalData.users.filter(u => u.Role !== 'Director').map(u => `<option value="${u.ID}">${u.Name}</option>`).join('');
        }

        function renderTasks() {
            const tbody = document.getElementById('taskTableBody');
            tbody.innerHTML = globalData.tasks.slice().reverse().map(t => {
                const emp = globalData.users.find(u => String(u.ID) === String(t.EmployeeID)) || {};
                const count = globalData.comments.filter(c => String(c.TaskID) === String(t.TaskID)).length;
                const hasNew = count > (taskReadStatus[t.TaskID] || 0);
                return `
                    <tr class="emp-row">
                        <td><div class="fw-bold small">${emp.Name || 'Staff'}</div><div class="text-muted" style="font-size:0.7rem">${emp.Office || ''}</div></td>
                        <td><div class="small fw-bold text-truncate" style="max-width: 120px;">${t.Title}</div></td>
                        <td><span class="status-pill bg-${t.Status.toLowerCase()}">${t.Status}</span></td>
                        <td class="text-center">
                            <button onclick="openComments('${t.TaskID}', ${count})" class="btn btn-sm btn-white border-0 position-relative">
                                <i class="bi bi-chat-dots text-primary fs-5"></i>
                                ${hasNew ? '<span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"></span>' : ''}
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function openComments(taskId, count) { activeTaskId = taskId; taskReadStatus[taskId] = count; isModalOpen = true; new bootstrap.Modal(document.getElementById('commentModal')).show(); refreshData(); }

        function renderThread(thread) {
            const div = document.getElementById('commentThread');
            const html = thread.map(c => `<div class="chat-msg ${c.SenderName === 'Director' ? 'msg-me' : 'msg-them'}"><div class="fw-bold" style="font-size:0.7rem">${c.SenderName}</div>${c.Message}</div>`).join('');
            if(div.innerHTML !== html) { div.innerHTML = html; div.scrollTop = div.scrollHeight; }
        }

        async function submitComment() {
            const input = document.getElementById('commentInput');
            if(!input.value.trim() || isSending) return;
            isSending = true;
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "ADD_COMMENT", taskId: activeTaskId, senderName: "Director", message: input.value.trim() }) });
            input.value = ''; isSending = false; refreshData();
        }

        async function createTask() {
            const empId = document.getElementById('empSelect').value;
            const emp = globalData.users.find(u => String(u.ID) === String(empId));
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "CREATE_TASK", empId, empName: emp.Name, office: emp.Office, title: document.getElementById('taskTitle').value, instructions: document.getElementById('taskInstructions').value }) });
            alert("Task Sent!"); refreshData();
        }

        function logout() { localStorage.clear(); window.location.href = "index.html"; }
        document.getElementById('commentModal').addEventListener('hidden.bs.modal', () => { isModalOpen = false; refreshData(); });
        setInterval(refreshData, 5000);
        window.onload = refreshData;
    </script>
</body>
</html>

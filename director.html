<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director Panel | Task Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; }
        .navbar { background: #1e293b; color: white; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .status-pill { font-size: 0.75rem; padding: 4px 12px; border-radius: 20px; font-weight: 600; }
        .bg-assigned { background: #fef3c7; color: #92400e; }
        .bg-received { background: #dbeafe; color: #1e40af; }
        .bg-completed { background: #dcfce7; color: #166534; }
        .chat-msg { padding: 8px 12px; border-radius: 15px; margin-bottom: 8px; font-size: 0.85rem; max-width: 85%; }
        .msg-me { background: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg-them { background: #e2e8f0; color: #1e293b; align-self: flex-start; border-bottom-left-radius: 2px; }
        .emp-pic-sm { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; margin-right: 8px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark p-3 mb-4">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold"><i class="bi bi-shield-lock me-2"></i> Director Control Panel</span>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container-fluid">
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card p-4">
                <h5 class="fw-bold mb-3">Assign New Task</h5>
                <div class="mb-3">
                    <label class="small fw-bold">Select Employee</label>
                    <select id="empSelect" class="form-select"></select>
                </div>
                <div class="mb-3">
                    <label class="small fw-bold">Task Title</label>
                    <input type="text" id="taskTitle" class="form-control" placeholder="e.g., Monthly Report">
                </div>
                <div class="mb-3">
                    <label class="small fw-bold">Instructions</label>
                    <textarea id="taskInstructions" class="form-control" rows="3"></textarea>
                </div>
                <button onclick="createTask()" id="createBtn" class="btn btn-primary w-100 fw-bold">Send Task</button>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="fw-bold m-0">Live Task Monitor</h5>
                    <button onclick="refreshData()" class="btn btn-sm btn-light border"><i class="bi bi-arrow-clockwise"></i></button>
                </div>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Employee</th>
                                <th>Task</th>
                                <th>Status</th>
                                <th>Discussion</th>
                            </tr>
                        </thead>
                        <tbody id="taskTableBody">
                            <tr><td colspan="4" class="text-center py-4">Loading data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="commentModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <h5 class="fw-bold">Discussion Thread</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="commentThread" class="d-flex flex-column mb-3" style="height: 300px; overflow-y: auto; background: #f1f5f9; padding: 15px; border-radius: 10px;"></div>
                <div class="input-group">
                    <input type="text" id="commentInput" class="form-control" placeholder="Reply to employee...">
                    <button class="btn btn-primary" onclick="submitComment()"><i class="bi bi-send"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwLGja8-IDIYIBEENNZNw2FhGQnKEt3vGaRjX1ndB34LFVfnkNkcebUg9HaI0k4Di4/exec"; // USE THE SAME DEPLOY URL
    let globalData = { users: [], tasks: [], comments: [] };
    let activeTaskId = null;
    let directorName = "Director"; // Or fetch from session if you have a director login

    async function refreshData() {
        try {
            const res = await fetch(API_URL);
            globalData = await res.json();
            renderEmployees();
            renderTasks();
        } catch (e) { console.error("Refresh failed", e); }
    }

    function renderEmployees() {
        const select = document.getElementById('empSelect');
        const emps = globalData.users.filter(u => u.Role !== 'Director');
        select.innerHTML = emps.map(u => `<option value="${u.ID}">${u.Name} (${u.Office})</option>`).join('');
    }

    function renderTasks() {
        const tbody = document.getElementById('taskTableBody');
        if (globalData.tasks.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center">No tasks assigned yet.</td></tr>';
            return;
        }

        tbody.innerHTML = globalData.tasks.reverse().map(t => {
            const emp = globalData.users.find(u => String(u.ID) === String(t.EmployeeID)) || {};
            const hasComments = globalData.comments.some(c => String(c.TaskID) === String(t.TaskID));
            const statusClass = t.Status.toLowerCase();
            
            return `
                <tr>
                    <td>
                        <div class="d-flex align-items-center">
                            <img src="${emp.ProfilePic || 'https://via.placeholder.com/30'}" class="emp-pic-sm">
                            <div>
                                <div class="fw-bold small">${emp.Name || 'Unknown'}</div>
                                <div class="text-muted" style="font-size:0.7rem">${emp.Office || ''}</div>
                            </div>
                        </div>
                    </td>
                    <td><div class="small fw-bold">${t.Title}</div></td>
                    <td><span class="status-pill bg-${statusClass}">${t.Status}</span></td>
                    <td>
                        <button onclick="openComments('${t.TaskID}')" class="btn btn-sm btn-light position-relative">
                            <i class="bi bi-chat-left-text"></i>
                            ${hasComments ? '<span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"></span>' : ''}
                        </button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    async function openComments(taskId) {
        activeTaskId = taskId;
        const modal = new bootstrap.Modal(document.getElementById('commentModal'));
        modal.show();
        
        // Filter comments for this task
        const thread = globalData.comments.filter(c => String(c.TaskID) === String(taskId));
        
        document.getElementById('commentThread').innerHTML = thread.map(c => `
            <div class="chat-msg ${c.SenderName === directorName ? 'msg-me' : 'msg-them'}">
                <div style="font-size:0.65rem; opacity:0.8">${c.SenderName}</div>
                ${c.Message}
            </div>
        `).join('') || '<div class="text-center small text-muted">No messages yet.</div>';
    }

    async function submitComment() {
        const msg = document.getElementById('commentInput').value;
        if (!msg) return;

        await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: "ADD_COMMENT",
                taskId: activeTaskId,
                senderName: directorName,
                message: msg
            })
        });

        document.getElementById('commentInput').value = '';
        // Re-fetch everything to show the new message
        await refreshData();
        openComments(activeTaskId); 
    }

    async function createTask() {
        const btn = document.getElementById('createBtn');
        const empId = document.getElementById('empSelect').value;
        const emp = globalData.users.find(u => String(u.ID) === String(empId));

        const payload = {
            action: "CREATE_TASK",
            empId: empId,
            empName: emp.Name,
            office: emp.Office,
            title: document.getElementById('taskTitle').value,
            instructions: document.getElementById('taskInstructions').value
        };

        btn.disabled = true;
        btn.innerText = "Sending...";
        
        await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        
        alert("Task Assigned Successfully!");
        document.getElementById('taskTitle').value = "";
        document.getElementById('taskInstructions').value = "";
        btn.disabled = false;
        btn.innerText = "Send Task";
        refreshData();
    }

    function logout() { localStorage.clear(); window.location.href = "index.html"; }

    // Auto-refresh every 30 seconds
    setInterval(refreshData, 30000);
    window.onload = refreshData;
</script>
</body>
</html>

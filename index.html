<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Portal | Auth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; }
        .auth-card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; }
        .btn-primary { background: #2563eb; border: none; padding: 12px; font-weight: 600; border-radius: 10px; }
        .form-control, .form-select { padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .hidden { display: none !important; }
        .loader { width: 20px; height: 20px; border: 3px solid #FFF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="card auth-card shadow mx-auto" style="max-width: 400px;">
        <div class="p-4 p-md-5">
            <div id="loginBox">
                <h2 class="fw-bold mb-1 text-center">Welcome Back</h2>
                <p class="text-muted mb-4 small text-center">Log in to manage your tasks.</p>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Employee ID</label>
                    <input type="text" id="loginId" class="form-control" placeholder="e.g. EMP-01">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Password</label>
                    <input type="password" id="loginPass" class="form-control" placeholder="••••••••">
                </div>
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="showPass" onclick="togglePass('loginPass')">
                    <label class="form-check-label small text-muted" for="showPass">Show Password</label>
                </div>
                <button onclick="login()" id="loginBtn" class="btn btn-primary w-100 mb-3">Sign In</button>
                <p class="text-center small mb-0">No account? <a href="#" onclick="toggleAuth()" class="text-decoration-none fw-bold">Register Now</a></p>
            </div>

            <div id="registerBox" class="hidden">
                <h2 class="fw-bold mb-1 text-center">Create Account</h2>
                <p class="text-muted mb-4 small text-center">Join the task tracking system.</p>
                <input type="text" id="regName" class="form-control mb-3" placeholder="Full Name">
                <input type="text" id="regId" class="form-control mb-3" placeholder="Employee ID (e.g. EMP-01)">
                <select id="regOffice" class="form-select mb-3">
                    <option value="">-- Select Office --</option>
                    <option value="Admin">Admin</option>
                    <option value="Finance">Finance</option>
                    <option value="HR">HR</option>
                    <option value="Operations">Operations</option>
                </select>
                <input type="password" id="regPass" class="form-control mb-3" placeholder="Create Password">
                <button onclick="register()" id="regBtn" class="btn btn-primary w-100 mb-3>

                <button onclick="register()" id="regBtn" class="btn btn-primary w-100 mb-3">Create Account</button>
                <p class="text-center small mb-0"><a href="#" onclick="toggleAuth()" class="text-decoration-none fw-bold">Back to Login</a></p>
            </div>
        </div>
    </div>
</div>

<script>
    // CRITICAL: Replace with your actual Web App URL from the 'Deploy' button in Apps Script
    const API_URL = "https://script.google.com/macros/s/AKfycbwLGja8-IDIYIBEENNZNw2FhGQnKEt3vGaRjX1ndB34LFVfnkNkcebUg9HaI0k4Di4/exec";

    function toggleAuth() {
        document.getElementById('loginBox').classList.toggle('hidden');
        document.getElementById('registerBox').classList.toggle('hidden');
    }

    function togglePass(id) {
        const x = document.getElementById(id);
        x.type = x.type === "password" ? "text" : "password";
    }

    /**
     * LOGIN LOGIC
     * Fetches all users from GSheets and validates credentials locally
     */
    async function login() {
        const idInput = document.getElementById('loginId').value.trim();
        const passInput = document.getElementById('loginPass').value.trim();
        const btn = document.getElementById('loginBtn');

        if (!idInput || !passInput) return alert("Please enter both ID and Password");

        btn.disabled = true;
        btn.innerHTML = '<span class="loader"></span> Verifying...';

        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            
            // Search for user with case-insensitive ID match
            const user = data.users.find(u => 
                String(u.id).toLowerCase() === idInput.toLowerCase() && 
                String(u.password) === passInput
            );

            if (user) {
                // Save session to localStorage
                localStorage.setItem('office_session', JSON.stringify(user));
                
                // Redirect based on role
                if (user.role === "Director") {
                    window.location.href = "director.html";
                } else {
                    window.location.href = "dashboard.html";
                }
            } else {
                alert("❌ Invalid Credentials. Please try again.");
                btn.disabled = false;
                btn.innerText = "Sign In";
            }
        } catch (e) {
            console.error(e);
            alert("Connection error. Ensure your script is deployed as 'Anyone'.");
            btn.disabled = false;
            btn.innerText = "Sign In";
        }
    }

    /**
     * REGISTRATION LOGIC
     * Sends new user data to Apps Script doPost()
     */
    async function register() {
        const id = document.getElementById('regId').value.trim();
        const name = document.getElementById('regName').value.trim();
        const office = document.getElementById('regOffice').value;
        const pass = document.getElementById('regPass').value.trim();
        const btn = document.getElementById('regBtn');

        if (!id || !name || !office || !pass) return alert("All fields are required");

        btn.disabled = true;
        btn.innerHTML = '<span class="loader"></span> Processing...';

        const payload = {
            action: "REGISTER",
            id: id,
            name: name,
            designation: office,
            pass: pass
        };

        try {
            // We use 'text/plain' and 'no-cors' for the most reliable POST to GAS
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            });

            // Since 'no-cors' doesn't return readable text, we alert and reload
            alert("✅ Registration request sent! Please try logging in.");
            location.reload();
            
        } catch (e) {
            alert("Registration failed. Check your internet connection.");
            btn.disabled = false;
            btn.innerText = "Create Account";
        }
    }

    // Auto-login check: If session exists, redirect away from login page
    window.onload = () => {
        const session = JSON.parse(localStorage.getItem('office_session'));
        if (session) {
            window.location.href = (session.role === "Director") ? "director.html" : "dashboard.html";
        }
    };
</script>
</body>
</html>

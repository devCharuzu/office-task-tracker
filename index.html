<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Portal | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; align-items: center; }
        .auth-card { width: 100%; max-width: 400px; border: none; border-radius: 15px; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="card auth-card shadow-lg mx-auto p-4">
        <div id="loginBox">
            <h3 class="text-center fw-bold mb-4">Welcome Back</h3>
            <input type="text" id="userID" class="form-control mb-3" placeholder="Employee ID">
            <input type="password" id="userPass" class="form-control mb-3" placeholder="Password">
            <button onclick="login()" class="btn btn-primary w-100 mb-3">Login</button>
            <p class="text-center small">First time? <a href="#" onclick="toggleAuth()">Register Account</a></p>
        </div>

        <div id="registerBox" class="hidden">
            <h3 class="text-center fw-bold mb-4">Set Password</h3>
            <p class="text-muted small text-center">Enter your ID provided by the office to set your private password.</p>
            <input type="text" id="regID" class="form-control mb-3" placeholder="Employee ID">
            <input type="password" id="regPass" class="form-control mb-3" placeholder="Create New Password">
            <button onclick="register()" class="btn btn-success w-100 mb-3">Save & Activate</button>
            <p class="text-center small"><a href="#" onclick="toggleAuth()">Back to Login</a></p>
        </div>
    </div>
</div>

<script>
    const API_URL = "YOUR_APPS_SCRIPT_URL";

    // SESSION CHECK: If already logged in, redirect
    window.onload = () => {
        const session = JSON.parse(localStorage.getItem('office_session'));
        if (session) redirect(session.role);
    };

    function toggleAuth() {
        document.getElementById('loginBox').classList.toggle('hidden');
        document.getElementById('registerBox').classList.toggle('hidden');
    }

    async function login() {
        const id = document.getElementById('userID').value;
        const pass = document.getElementById('userPass').value;
        
        const res = await fetch(API_URL);
        const data = await res.json();
        const user = data.users.find(u => u.id === id && u.password === pass);

        if (user) {
            localStorage.setItem('office_session', JSON.stringify(user));
            redirect(user.role);
        } else {
            alert("Invalid Credentials");
        }
    }

    async function register() {
        const id = document.getElementById('regID').value;
        const pass = document.getElementById('regPass').value;
        
        // This sends the new password to the Google Sheet
        await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "REGISTER", id: id, pass: pass })
        });
        alert("Account Activated! You can now login.");
        toggleAuth();
    }

    function redirect(role) {
        window.location.href = (role === "Director") ? "director.html" : "dashboard.html";
    }
</script>
</body>
</html>

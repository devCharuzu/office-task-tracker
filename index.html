<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Portal | Auth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; }
        .auth-card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; }
        .btn-primary { background: #2563eb; border: none; padding: 12px; font-weight: 600; border-radius: 10px; }
        .form-control, .form-select { padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .hidden { display: none !important; }
        @media (max-width: 576px) { .container { padding: 20px; } .auth-card { border-radius: 15px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="card auth-card shadow mx-auto" style="max-width: 450px;">
        <div class="p-4 p-md-5">
            <div id="loginBox">
                <h2 class="fw-bold mb-1">Welcome</h2>
                <p class="text-muted mb-4 small">Enter your credentials to access the portal.</p>
                <input type="text" id="loginId" class="form-control mb-3" placeholder="Employee ID">
                <input type="password" id="loginPass" class="form-control mb-4" placeholder="Password">
                <button onclick="login()" id="loginBtn" class="btn btn-primary w-100 mb-3">Sign In</button>
                <p class="text-center small mb-0">No account? <a href="#" onclick="toggleAuth()" class="text-decoration-none fw-bold">Register Now</a></p>
            </div>

            <div id="registerBox" class="hidden">
                <h2 class="fw-bold mb-1">Join Us</h2>
                <p class="text-muted mb-4 small">Create your unique ID and private password.</p>
                <input type="text" id="regName" class="form-control mb-3" placeholder="Full Name">
                <input type="text" id="regId" class="form-control mb-3" placeholder="Create Employee ID (e.g. EMP-01)">
                <select id="regOffice" class="form-select mb-3">
                    <option value="">-- Select Office --</option>
                    <option value="Admin">Admin</option>
                    <option value="Finance">Finance</option>
                    <option value="HR">HR</option>
                    <option value="Operations">Operations</option>
                </select>
                <input type="password" id="regPass" class="form-control mb-4" placeholder="Create Password">
                <button onclick="register()" id="regBtn" class="btn btn-success w-100 mb-3 py-3 border-0 fw-bold">Create Account</button>
                <p class="text-center small mb-0"><a href="#" onclick="toggleAuth()" class="text-decoration-none fw-bold">Back to Login</a></p>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwLGja8-IDIYIBEENNZNw2FhGQnKEt3vGaRjX1ndB34LFVfnkNkcebUg9HaI0k4Di4/exec";

    function toggleAuth() {
        document.getElementById('loginBox').classList.toggle('hidden');
        document.getElementById('registerBox').classList.toggle('hidden');
    }

    async function login() {
        const id = document.getElementById('loginId').value;
        const pass = document.getElementById('loginPass').value;
        const btn = document.getElementById('loginBtn');
        if(!id || !pass) return alert("Please fill all fields");

        btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Verifying...';

        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            const user = data.users.find(u => u.id.toString() === id && u.password.toString() === pass);

            if (user) {
                localStorage.setItem('office_session', JSON.stringify(user));
                window.location.href = (user.role === "Director") ? "director.html" : "dashboard.html";
            } else {
                alert("Invalid ID or Password");
                btn.disabled = false; btn.innerText = "Sign In";
            }
        } catch(e) { alert("Connection Error"); btn.disabled = false; }
    }

    async function register() {
        const id = document.getElementById('regId').value;
        const name = document.getElementById('regName').value;
        const office = document.getElementById('regOffice').value;
        const pass = document.getElementById('regPass').value;
        const btn = document.getElementById('regBtn');

        if(!id || !name || !office || !pass) return alert("All fields are required");

        btn.disabled = true; btn.innerText = "Checking ID Availability...";

        const payload = { action: "REGISTER", id, name, designation: office, pass };
        const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await response.text();

        if (result === "DUPLICATE") {
            alert("❌ Employee ID already exists. Try another.");
            btn.disabled = false; btn.innerText = "Create Account";
        } else {
            alert("✅ Account Created Successfully!");
            location.reload();
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Portal | Auth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; }
        .auth-card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; background: white; }
        .btn-primary { background: #2563eb; border: none; padding: 12px; font-weight: 600; border-radius: 10px; transition: 0.3s; }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-2px); }
        .form-control, .form-select { padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; background: #f8fafc; }
        .hidden { display: none !important; }
        .loader { width: 20px; height: 20px; border: 3px solid #FFF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="card auth-card shadow mx-auto" style="max-width: 400px;">
        <div class="p-4 p-md-5">
            <div id="loginBox">
                <h2 class="fw-bold mb-1 text-center">Welcome Back</h2>
                <p class="text-muted mb-4 small text-center">Log in to manage your tasks.</p>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Employee ID</label>
                    <input type="text" id="loginId" class="form-control" placeholder="e.g. 001">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Password</label>
                    <input type="password" id="loginPass" class="form-control" placeholder="••••••••">
                </div>
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="showPass" onclick="togglePass('loginPass')">
                    <label class="form-check-label small text-muted" for="showPass">Show Password</label>
                </div>
                <button onclick="login()" id="loginBtn" class="btn btn-primary w-100 mb-3">Sign In</button>
                <p class="text-center small mb-0">No account? <a href="#" onclick="toggleAuth()" class="text-decoration-none fw-bold">Register Now</a></p>
            </div>

            <div id="registerBox" class="hidden">
                <h2 class="fw-bold mb-1 text-center">Create Account</h2>
                <p class="text-muted mb-4 small text-center">Join the task tracking system.</p>
                <div class="mb-3">
                    <input type="text" id="regName" class="form-control" placeholder="Full Name">
                </div>
                <div class="mb-3">
                    <input type="text" id="regId" class="form-control" placeholder="Employee ID (e.g. 002)">
                </div>
                <div class="mb-3">
                    <select id="regOffice" class="form-select">
                        <option value="">-- Select Office --</option>
                        <option value="Admin">Admin</option>
                        <option value="Finance">Finance</option>
                        <option value="HR">HR</option>
                        <option value="Operations">Operations</option>
                        <option value="Executive">Executive</option>
                    </select>
                </div>
                <div class="mb-3">
                    <input type="password" id="regPass" class="form-control" placeholder="Create Password">
                </div>
                <button onclick="register()" id="regBtn" class="btn btn-primary w-100 mb-3">Create Account</button>
                <p class="text-center small mb-0"><a href="#" onclick="toggleAuth()" class="text-decoration-none fw-bold">Back to Login</a></p>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://taskflow-api.jcpanganiban1.workers.dev";

    function toggleAuth() {
        document.getElementById('loginBox').classList.toggle('hidden');
        document.getElementById('registerBox').classList.toggle('hidden');
    }

    function togglePass(id) {
        const x = document.getElementById(id);
        x.type = x.type === "password" ? "text" : "password";
    }

    async function login() {
        const idInput = document.getElementById('loginId').value.trim();
        const passInput = document.getElementById('loginPass').value.trim();
        const btn = document.getElementById('loginBtn');

        if(!idInput || !passInput) return alert("Please fill all fields");
        
        btn.disabled = true;
        btn.innerHTML = '<span class="loader"></span>';

        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            const user = data.users.find(u => String(u.ID) === idInput && String(u.Password) === passInput);

            if (user) {
                localStorage.setItem('office_session', JSON.stringify(user));
                window.location.href = user.Role === "Director" ? "director.html" : "dashboard.html";
            } else {
                alert("Invalid ID or Password");
            }
        } catch (e) {
            alert("System Error: Check Internet or API Deployment.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = "Sign In";
        }
    }

    async function register() {
    const id = document.getElementById('regId').value.trim();
    const name = document.getElementById('regName').value.trim();
    const office = document.getElementById('regOffice').value;
    const pass = document.getElementById('regPass').value.trim();
    const btn = document.getElementById('regBtn');

    if (!id || !name || !office || !pass) return alert("All fields are required");

    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span>';

    try {
        const res = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ 
                action: "REGISTER", 
                id: id, 
                name: name, 
                office: office, // Changed from 'designation' to 'office'
                pass: pass 
            })
        });
        const result = await res.text();
        
        if (result === "SUCCESS") {
            alert("Registration successful! You can now log in.");
            toggleAuth();
        } else if (result === "EXISTS") {
            alert("This Employee ID is already registered.");
        } else {
            alert("Error: " + result);
        }
    } catch (e) {
        alert("Registration failed. Check your connection or API deployment.");
    } finally {
        btn.disabled = false;
        btn.innerHTML = "Create Account";
    }
}

    window.onload = () => {
        const session = localStorage.getItem('office_session');
        if (session) {
            const user = JSON.parse(session);
            window.location.href = user.Role === "Director" ? "director.html" : "dashboard.html";
        }
    };
</script>
</body>
</html>

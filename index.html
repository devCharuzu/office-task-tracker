<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director Dashboard | Task Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root { --primary-color: #2563eb; --bg-light: #f8fafc; }
        body { background-color: var(--bg-light); font-family: 'Inter', sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .bg-assigned { background: #fef3c7; color: #92400e; }
        .bg-received { background: #e0f2fe; color: #075985; }
        .bg-completed { background: #dcfce7; color: #166534; }
        .btn-primary { background: var(--primary-color); border: none; padding: 10px 20px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand fw-bold d-flex align-items-center">
            <span class="material-icons-round me-2">dashboard</span> Director Panel
        </span>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-lg-4 mb-4">
            <div class="card p-4">
                <h5 class="fw-bold mb-3">Assign New Task</h5>
                <form id="taskForm">
                   <div class="mb-3">
    <label class="form-label small fw-bold">1. Select Office Designation</label>
    <select id="designation" class="form-select" onchange="filterEmployees()">
        <option value="">-- Select Office --</option>
        <option value="Admin">Admin</option>
        <option value="Finance">Finance</option>
        <option value="HR">HR</option>
    </select>
</div>

<div class="mb-3">
    <label class="form-label small fw-bold">2. Select Employee</label>
    <select id="empSelect" class="form-select" disabled>
        <option value="">-- Select Designation First --</option>
    </select>
</div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Designation</label>
                        <select id="designation" class="form-select">
                            <option value="Admin">Admin</option>
                            <option value="Finance">Finance</option>
                            <option value="HR">HR</option>
                            <option value="Operations">Operations</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Instructions</label>
                        <textarea id="instructions" class="form-control" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 d-flex align-items-center justify-content-center">
                        <span class="material-icons-round me-1">send</span> Assign Task
                    </button>
                </form>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold m-0">Live Task Monitor</h5>
                    <button onclick="loadTasks()" class="btn btn-light btn-sm d-flex align-items-center">
                        <span class="material-icons-round me-1">refresh</span> Refresh
                    </button>
                </div>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Task</th>
                                <th>Assigned To</th>
                                <th>Status</th>
                                <th>Timestamps</th>
                            </tr>
                        </thead>
                        <tbody id="taskTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwLGja8-IDIYIBEENNZNw2FhGQnKEt3vGaRjX1ndB34LFVfnkNkcebUg9HaI0k4Di4/exec"; 
let allUsers = []; // We will store the users here

async function loadData() {
    const res = await fetch(API_URL);
    const data = await res.json();
    
    allUsers = data.users; // Store the user list
    renderTaskTable(data.tasks); // Function to show the tasks
}

function filterEmployees() {
    const selectedOffice = document.getElementById('designation').value;
    const empSelect = document.getElementById('empSelect');
    
    // Clear previous options
    empSelect.innerHTML = '<option value="">-- Select Employee --</option>';
    
    if (selectedOffice === "") {
        empSelect.disabled = true;
        return;
    }

    // Filter users who match the selected designation
    const filteredUsers = allUsers.filter(u => u.designation === selectedOffice);

    if (filteredUsers.length > 0) {
        filteredUsers.forEach(user => {
            const opt = document.createElement('option');
            opt.value = user.id;
            opt.textContent = `${user.name} (${user.id})`;
            empSelect.appendChild(opt);
        });
        empSelect.disabled = false;
    } else {
        empSelect.innerHTML = '<option value="">No employees found in this office</option>';
        empSelect.disabled = true;
    }
}
    // Handle Form Submission
    document.getElementById('taskForm').onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            action: "CREATE",
            taskId: "T" + Date.now(),
            title: document.getElementById('title').value,
            empId: document.getElementById('empId').value,
            designation: document.getElementById('designation').value,
            instructions: document.getElementById('instructions').value
        };

        await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
        alert("Task Assigned Successfully!");
        document.getElementById('taskForm').reset();
        loadTasks();
    };

    // Load Tasks for the Monitor
    async function loadTasks() {
        const res = await fetch(API_URL);
        const tasks = await res.json();
        const tbody = document.getElementById('taskTableBody');
        
        tbody.innerHTML = tasks.map(t => `
            <tr>
                <td>
                    <div class="fw-bold">${t.Title}</div>
                    <div class="text-muted small">${t.Designation}</div>
                </td>
                <td>${t.EmployeeID}</td>
                <td>
                    <span class="status-badge bg-${t.Status.toLowerCase()}">${t.Status}</span>
                </td>
                <td class="small text-muted">
                    Created: ${t.CreatedTS ? new Date(t.CreatedTS).toLocaleTimeString() : '-'}<br>
                    Completed: ${t.CompletedTS ? new Date(t.CompletedTS).toLocaleTimeString() : '-'}
                </td>
            </tr>
        `).join('');
    }

    // Auto-refresh every 60 seconds
    setInterval(loadTasks, 60000);
loadData();
</script>
</body>
</html>
